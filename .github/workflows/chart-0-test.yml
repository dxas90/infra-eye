name: Helm Chart - 0 Test and Lint

description: |
  Lint and test Helm chart.

on:
  pull_request:
    branches:
      - main
    paths:
      - "src/**"
      - "chart/**"
      - ".github/workflows/chart-*.yml"
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "chart/**"
      - ".github/workflows/chart-*.yml"
  workflow_dispatch:

permissions:
  contents: write

env:
  CHART_PATH: chart/infra-eye

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v5
        with:
          version: "latest"

      - name: Lint Helm chart
        run: |
          helm lint ${{ env.CHART_PATH }}
      

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v5
        with:
          version: "latest"

      - name: Helm unittest
        run: |
          helm plugin install  --verify=false https://github.com/helm-unittest/helm-unittest
          helm unittest ${{ env.CHART_PATH }}

      - name: Helm template dry-run
        run: |
          helm template test-release ${{ env.CHART_PATH }}

  build-and-push:
    runs-on: ubuntu-latest
    needs: [test, lint]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v5
        with:
          version: "latest"
      
      - name: Package Helm chart
        run: |
          helm package ${{ env.CHART_PATH }} --destination .

  publish:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Get next version (semver)
        id: semver
        uses: ietf-tools/semver-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: main
          prefix: "chart-"
          patchList: fix, chore, docs
          noVersionBumpBehavior: current
          skipInvalidTags: true

      - name: Commit and push Chart.yaml version bump (PR)
        id: bumppr
        run: |
          VERSION="${{ steps.semver.outputs.next }}"
          BRANCH="chore/bump-$VERSION"

          # Update Chart.yaml with new version
          yq eval -i ".version = \"$VERSION\"" ${{ env.CHART_PATH }}/Chart.yaml

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add ${{ env.CHART_PATH }}/Chart.yaml
          git commit -m "chore(release): bump Helm chart version to $VERSION" || echo "No changes to commit"
          git push origin "$BRANCH"
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT

      - name: Create PR for version bump
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ steps.bumppr.outputs.branch }}
          base: main
          title: "chore(release): bump Helm chart version to ${{ steps.semver.outputs.next }}"
          body: "Automated Helm chart version bump to ${{ steps.semver.outputs.next }}.\n\nThis PR was created automatically by the release workflow."
          commit-message: "chore(release): bump Helm chart version to ${{ steps.semver.outputs.next }} [skip ci]"
          labels: "release, automated-pr"
          draft: false
