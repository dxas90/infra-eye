name: Build and Publish Docker Image

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
    paths-ignore:
      - "chart/**"
  pull_request:
    paths-ignore:
      - "chart/**"
    branches:
      - main
  workflow_dispatch:

permissions: {}

env:
  REGISTRY: ghcr.io

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Biome linter
        run: npx biome lint .

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test:coverage

  build-and-push:
    runs-on: ubuntu-latest
    needs: [test, lint]
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
    permissions:
      contents: write
      packages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Convert repository name to lowercase
        id: repo
        run: echo "image_name=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Get next version
        id: semver
        uses: ietf-tools/semver-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: main
          prefix: "docker-"
          patchList: fix, chore, docs
          noVersionBumpBehavior: current
          skipInvalidTags: true

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ steps.repo.outputs.image_name }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=raw,value=${{ steps.semver.outputs.next }}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: |
            type=registry,ref=${{ env.REGISTRY }}/${{ steps.repo.outputs.image_name }}:buildcache
            type=gha
          cache-to: |
            ${{ github.event_name != 'pull_request' && format('type=registry,ref={0}/{1}:buildcache,mode=max', env.REGISTRY, steps.repo.outputs.image_name) || '' }}
            type=gha,mode=max

      - name: Create GitHub Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${{ steps.semver.outputs.next }}
          RELEASE_TAG="${VERSION}"

          # Create release notes
          cat > release_notes.md << EOF
          ## Docker Image Release

          \`\`\`bash
            docker pull ${{ env.REGISTRY }}/${{ steps.repo.outputs.image_name }}:${VERSION}
          \`\`\`

          ### Available Images
          - \`${{ env.REGISTRY }}/${{ steps.repo.outputs.image_name }}:${VERSION}\`
          - \`${{ env.REGISTRY }}/${{ steps.repo.outputs.image_name }}:latest\`

          ### Supported Platforms
          - linux/amd64
          - linux/arm64

          ### Build Information
          - Commit SHA: \`${{ github.sha }}\`
          - Committed by: @${{ github.actor }}
          - Build Date: ${{ github.event.head_commit.timestamp }}
          EOF

          # Create release
          gh release create "${RELEASE_TAG}" \
            --title "Docker Image ${VERSION}" \
            --notes-file release_notes.md \
            --latest
