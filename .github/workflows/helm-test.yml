name: Helm Chart Test, Lint, Version Bump and Tag

description: |
  Auto-bump Helm chart version in Chart.yaml using conventional commits 
  and create a semver tag (vX.Y.Z) for Helm releases.

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'chart/infra-eye/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'yarn.lock'
      - 'README.md'
      - '.github/workflows/helm-bump-and-tag.yml'
  workflow_dispatch:

permissions:
  contents: write

env:
  CHART_PATH: chart/infra-eye

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v5
        with:
          version: "latest"

      - name: Lint Helm chart
        run: |
          helm lint ${{ env.CHART_PATH }}

      - name: Helm template dry-run
        run: |
          helm template test-release ${{ env.CHART_PATH }}

  bump-and-tag:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Get next version (semver)
        id: semver
        uses: ietf-tools/semver-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: main
          prefix: "chart-"
          patchList: fix, chore, docs
          noVersionBumpBehavior: current
          skipInvalidTags: true

      - name: Update Chart.yaml version
        run: |
          VERSION="${{ steps.semver.outputs.next }}"
          sed -i "s/^version:.*/version: $VERSION/" ${{ env.CHART_PATH }}/Chart.yaml
          echo "Updated Chart.yaml to version $VERSION"
          cat ${{ env.CHART_PATH }}/Chart.yaml

      - name: Commit and push Chart.yaml version bump
        run: |
          VERSION="${{ steps.semver.outputs.next }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ${{ env.CHART_PATH }}/Chart.yaml
          git commit -m "chore(release): bump Helm chart version to $VERSION [skip ci]" || echo "No changes to commit"
          git push origin main

      - name: Create Helm release tag
        run: |
          VERSION="${{ steps.semver.outputs.next }}"
          TAG="chart-v$VERSION"
          git tag "$TAG"
          git push origin "$TAG"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
